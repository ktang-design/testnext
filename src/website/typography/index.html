<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typography — StacksNext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/components/navigation/navigation.css" />
  <link rel="stylesheet" href="../website.css" />
  <link rel="stylesheet" href="../website-preview.css" />
  <link rel="stylesheet" href="typography.css" />
  <link rel="stylesheet" href="/shared/app-shell.css" />
</head>
<body>
  <header class="topnav">
    <div class="topnav__left">
      <a class="topnav__logo" href="#" aria-label="Stacks home">
        <img src="../assets/stacks-logo.svg" alt="Stacks" width="127" height="24" />
      </a>
      <nav class="topnav__menu" aria-label="Primary">
        <button type="button" class="navpill navpill--active" aria-current="page">
          <span class="navpill__icon navpill__icon--website" aria-hidden="true"></span>
          <span class="navpill__label">Website</span>
        </button>
        <button type="button" class="navpill">
          <span class="navpill__icon navpill__icon--features" aria-hidden="true"></span>
          <span class="navpill__label">Features</span>
        </button>
        <a class="navpill" href="/site-details/">
          <span class="navpill__icon navpill__icon--platform" aria-hidden="true"></span>
          <span class="navpill__label">Platform</span>
        </a>
      </nav>
    </div>
    <button type="button" class="usermenu" aria-label="User menu" aria-haspopup="true">
      <img class="usermenu__avatar" src="../assets/user-avatar.svg" alt="" aria-hidden="true" />
      <img class="usermenu__caret" src="/shared/chevron-down.svg" alt="" aria-hidden="true" />
    </button>
  </header>

  <div class="layout">
    <aside class="sidenav">
      <nav aria-label="Website">
        <ul class="sidenav__list">
          <li>
            <a class="nav-item nav-item--interactive" href="/website/pages/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><path d="M8 1.6 14.4 5 8 8.4 1.6 5 8 1.6Z"/><path d="m2 8 6 3.2L14 8"/><path d="m2 11 6 3.2L14 11"/></svg></span>
              <span class="nav-item__label">Pages</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive" href="/website/navigation/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><rect x="6" y="1.6" width="4" height="3.2" rx="0.6"/><rect x="1.6" y="11.2" width="4" height="3.2" rx="0.6"/><rect x="10.4" y="11.2" width="4" height="3.2" rx="0.6"/><path d="M8 4.8v2.6M3.6 11.2V7.4H12.4v3.8"/></svg></span>
              <span class="nav-item__label">Navigation</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive" href="/website/search/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="7" cy="7" r="4.2"/><path d="m10.2 10.2 3 3"/></svg></span>
              <span class="nav-item__label">Search</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive" href="/website/header/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><rect x="1.8" y="2.6" width="12.4" height="10.8" rx="1.5"/><path d="M1.8 6.2h12.4"/></svg></span>
              <span class="nav-item__label">Header</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive" href="/website/footer/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><rect x="1.8" y="2.6" width="12.4" height="10.8" rx="1.5"/><path d="M1.8 9.8h12.4"/></svg></span>
              <span class="nav-item__label">Footer</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive" href="/website/branding/">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><path d="M8 2.4S3.6 7 3.6 10a4.4 4.4 0 0 0 8.8 0C12.4 7 8 2.4 8 2.4Z"/></svg></span>
              <span class="nav-item__label">Branding</span>
            </a>
          </li>
          <li>
            <a class="nav-item nav-item--interactive is-active" href="#" aria-current="page">
              <span class="nav-item__icon"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 4.2h10M8 4.2v8.6"/></svg></span>
              <span class="nav-item__label">Typography</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <div class="content">
      <div class="navworkspace">
        <section class="navpanel" aria-labelledby="typo-title">
          <h1 class="navpanel__title" id="typo-title">Typography</h1>
          <p class="navpanel__desc">Configure the typography used across all pages and content.</p>

          <div class="typo-field">
            <label class="typo-label" for="font-family">Font family</label>
            <input class="typo-input" type="text" id="font-family" data-field="fontFamily" value="Inter" spellcheck="false" autocomplete="off" />
          </div>

          <div class="typo-field">
            <label class="typo-label" for="heading-size">Heading font size</label>
            <div class="typo-selectwrap">
              <select class="typo-select" id="heading-size" data-field="headingSize">
                <option value="default">Default (24px)</option>
                <option value="20">20px</option>
                <option value="28">28px</option>
                <option value="32">32px</option>
                <option value="36">36px</option>
                <option value="40">40px</option>
              </select>
            </div>
          </div>

          <div class="typo-field">
            <label class="typo-label" for="heading-weight">Heading font weight</label>
            <div class="typo-selectwrap">
              <select class="typo-select" id="heading-weight" data-field="headingWeight">
                <option value="default">Default (Semibold)</option>
                <option value="400">Regular (400)</option>
                <option value="500">Medium (500)</option>
                <option value="600">Semibold (600)</option>
                <option value="700">Bold (700)</option>
              </select>
            </div>
          </div>

          <div class="typo-field">
            <label class="typo-label" for="body-size">Body font size</label>
            <div class="typo-selectwrap">
              <select class="typo-select" id="body-size" data-field="bodySize">
                <option value="default">Default (16px)</option>
                <option value="14">14px</option>
                <option value="18">18px</option>
                <option value="20">20px</option>
              </select>
            </div>
          </div>

          <div class="typo-field">
            <label class="typo-label" for="body-weight">Body font weight</label>
            <div class="typo-selectwrap">
              <select class="typo-select" id="body-weight" data-field="bodyWeight">
                <option value="default">Default (Regular)</option>
                <option value="400">Regular (400)</option>
                <option value="500">Medium (500)</option>
                <option value="600">Semibold (600)</option>
                <option value="700">Bold (700)</option>
              </select>
            </div>
          </div>
        </section>

        <div class="navpreview" role="img" aria-label="Live website preview">
          <div data-website-preview></div>
        </div>
      </div>

      <footer class="pageactions">
        <div class="pageactions__inner">
          <span class="save-status" data-save-status role="status" aria-live="polite" hidden>Unsaved changes</span>
          <button type="button" class="btn btn--primary" data-action="save" disabled>
            <span class="btn__spinner" aria-hidden="true"></span>
            <span class="btn__label">Save</span>
          </button>
        </div>
      </footer>
    </div>
  </div>

  <div class="modal-overlay" data-modal="unsaved" role="dialog" aria-modal="true" aria-labelledby="unsaved-title" hidden>
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="unsaved-title">Unsaved changes</h2>
        <button type="button" class="modal__close" data-modal-close aria-label="Close dialog">
          <img src="/shared/close.svg" alt="" />
        </button>
      </div>
      <div class="modal__body">
        <p class="modal__text">You have unsaved changes that will be lost if you leave this page. Do you want to continue?</p>
      </div>
      <div class="modal__footer">
        <button type="button" class="modal__btn modal__btn--discard" data-modal-discard>Discard changes</button>
        <button type="button" class="modal__btn modal__btn--keep" data-modal-keep>Keep editing</button>
      </div>
    </div>
  </div>

  <!-- Apply saved typography before first paint (inline, no network) so the
       font/size/weight controls don't flash defaults while the page JS loads. -->
  <script>
    (function () {
      try {
        var c = JSON.parse(localStorage.getItem('ws-preview-config') || 'null');
        var t = c && c.typography; if (!t) return;
        var set = function (id, val) { var el = document.getElementById(id); if (el && val != null) el.value = val; };
        set('font-family', t.fontFamily);
        set('heading-size', t.headingSize);
        set('heading-weight', t.headingWeight);
        set('body-size', t.bodySize);
        set('body-weight', t.bodyWeight);
      } catch (e) { /* no cache / disabled — fall back to JS hydration */ }
    })();
  </script>
  <script src="/shared/app-shell.js"></script>
  <script src="/shared/auth-client.js"></script>
  <script src="../website-preview.js"></script>
  <script src="typography.js"></script>
</body>
</html>
