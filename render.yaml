# Render Blueprint for the StacksNext UAT environment — FREE tier (no card).
# Render → New → Blueprint → connect this repo. Render reads this file.
#
# Tradeoff: the free plan has NO persistent disk, so the SQLite database is
# ephemeral — it resets on every deploy and whenever the free service sleeps
# (free instances nap after ~15 min idle and cold-start on the next request).
# Good for a quick "show it working" UAT. To keep accounts permanently, switch
# `plan` to `starter` and add the disk block (see the persistent variant in the
# README), which requires a paid instance.
#
# Because data is ephemeral, the demo account IS seeded here so there's always a
# working login after a reset: demo@stacksnext.com / Password123!
services:
  - type: web
    name: stacksnext-uat
    runtime: node
    plan: free
    region: oregon           # pick the region closest to your testers
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"          # node:sqlite is unflagged from Node 24
      - key: NODE_ENV
        value: production
      - key: DATABASE_FILE
        value: /tmp/stacksnext.db   # writable, ephemeral on free
      - key: SESSION_SECRET
        generateValue: true  # Render generates + stores a strong secret
      - key: SEED_DEMO_USER
        value: "true"        # always have a usable login after a reset
