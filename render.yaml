# Render Blueprint for the StacksNext UAT environment.
# Render → New → Blueprint → connect this repo. Render reads this file.
#
# Notes:
# - A persistent disk requires a paid instance type (free has no disk). The disk
#   is what keeps users + sessions across deploys/restarts, so UAT wants it.
# - SESSION_SECRET is generated by Render (kept out of the repo).
# - The demo account is NOT seeded in production unless SEED_DEMO_USER=true.
services:
  - type: web
    name: stacksnext-uat
    runtime: node
    plan: starter            # smallest plan that supports a persistent disk
    region: oregon           # pick the region closest to your testers
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"          # node:sqlite is unflagged from Node 24
      - key: NODE_ENV
        value: production
      - key: DATABASE_FILE
        value: /data/stacksnext.db
      - key: SESSION_SECRET
        generateValue: true  # Render generates + stores a strong secret
      # To seed the demo account on UAT, uncomment:
      # - key: SEED_DEMO_USER
      #   value: "true"
    disk:
      name: sn-data
      mountPath: /data        # DATABASE_FILE points here
      sizeGB: 1
